  <line x1="660" y1="220" x2="1140" y2="220" stroke="#e4e7eb" stroke-width="1"/>
  <text x="620" y="474" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52606d">0</text>
  <text x="612" y="424" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52606d">15k</text>
  <text x="612" y="374" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52606d">30k</text>
  <text x="612" y="324" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52606d">45k</text>
  <text x="612" y="274" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52606d">60k</text>
  <text x="1112" y="474" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52606d">0</text>
  <text x="1102" y="424" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#52606d">2.5</text>
