  <text x="872" y="209" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1f2933">8.56 GiB</text>
  <text x="942" y="376" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1f2933">2.84 GiB</text>
  <text x="744" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2933">650M H200 x4</text>
  <text x="814" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2933">650M B200 x1</text>
  <text x="884" y="498" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2933">150M B200 x1</text>

  <rect x="60" y="586" width="1080" height="124" rx="18" fill="#f0eee6" stroke="#d9d5c5"/>
  <text x="86" y="624" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1f2933">Readout</text>
  <text x="86" y="654" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1f2933">• The stable 1-GPU B200 path is the practical production path right now: about 9.90% MFU for 650M, versus 0.24% on the old 4-GPU H200 path.</text>
  <text x="86" y="680" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1f2933">• Compile is disabled because the B200 jobs were failing inside Inductor/Triton with invalid kernel images. Stability improved immediately after turning it off.</text>
  <text x="86" y="706" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1f2933">• The current B200 jobs use larger local batches and explicit dataloader workers/prefetch, which is why throughput jumped while keeping memory modest.</text>
</svg>
