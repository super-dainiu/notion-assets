  <text x="475" y="518" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1f2933">stable path</text>

  <text x="650" y="142" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#1f2933">Throughput and GPU Memory</text>
